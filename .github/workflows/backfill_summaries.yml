name: Backfill Course Summaries

on:
  workflow_dispatch:
    inputs:
      limit:
        description: "Optional max number of courses to process"
        required: false
        type: string

jobs:
  backfill-summaries:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GEMINI_API_KEY: ${{ secrets.COURSE_SUMMARY_GENERATION_GEMINI_API_KEY }}
      GEMINI_MODEL: gemini-2.5-flash-lite
      PYTHONUNBUFFERED: '1'

    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ github.head_ref || github.ref_name }}
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v3
      with:
        python-version: "3.10"

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Apply Migrations
      working-directory: ./amherst_coursework_backend
      run: |
        python manage.py migrate --noinput

    - name: Backfill Missing Summaries
      working-directory: ./amherst_coursework_backend
      run: |
        if [ -n "${{ github.event.inputs.limit }}" ]; then
          python -u manage.py backfill_course_summaries --limit "${{ github.event.inputs.limit }}"
        else
          python -u manage.py backfill_course_summaries
        fi

    - name: Commit Database Changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add amherst_coursework_backend/db.sqlite3

        if git diff --staged --quiet; then
          echo "No database changes to commit"
          exit 0
        fi

        git commit -m "Backfill missing course summaries [automated]"
        git pull --rebase origin ${{ github.head_ref || github.ref_name }}
        git push
